<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف الطمأنينة</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fcfaf5; color: #2c3e50; }
        header { background: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .quran-container { background: white; padding: 20px; border-radius: 10px; line-height: 2; text-align: justify; font-size: 1.4rem; border: 1px solid #eee; }
        .basmalah { text-align: center; font-size: 1.8rem; color: #065f46; margin-bottom: 15px; }
        .verse { cursor: pointer; }
        .last-read { background: #fff9c4; border-bottom: 2px solid #d4af37; }
        .v-num { color: #065f46; font-size: 0.8rem; margin: 0 5px; }
        #resume-btn { background: #065f46; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 15px; cursor: pointer; display: none; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <button id="btn-back" class="hidden" onclick="showIndex()">✕</button>
    <h3 id="main-title" style="margin:0;">مصحف الطمأنينة</h3>
    <div id="save-status"></div>
</header>

<div class="container">
    <button id="resume-btn" onclick="resumeReading()"></button>
    <div id="index-page" class="grid"></div>
    <div id="reader-page" class="hidden">
        <div id="basmalah" class="basmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div id="quran-text" class="quran-container"></div>
    </div>
</div>

<script>
    const indexPage = document.getElementById('index-page');
    const readerPage = document.getElementById('reader-page');
    const quranText = document.getElementById('quran-text');
    const resumeBtn = document.getElementById('resume-btn');

    async function start() {
        try {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=ar');
            const data = await res.json();
            renderIndex(data.chapters);
            updateResumeButton();
        } catch (e) { document.body.innerHTML = "يرجى التحقق من الإنترنت وإعادة المحاولة."; }
    }

    function renderIndex(list) {
        indexPage.innerHTML = '';
        list.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = s.name_arabic;
            div.onclick = () => openSurah(s.id, s.name_arabic);
            indexPage.appendChild(div);
        });
    }

    async function openSurah(id, name, scrollVerse = null) {
        indexPage.classList.add('hidden');
        resumeBtn.classList.add('hidden');
        readerPage.classList.remove('hidden');
        document.getElementById('btn-back').classList.remove('hidden');
        document.getElementById('main-title').innerText = name;
        document.getElementById('basmalah').style.display = (id == 9 || id == 1) ? 'none' : 'block';
        quranText.innerHTML = "جاري التحميل...";

        const res = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`);
        const data = await res.json();
        
        quranText.innerHTML = '';
        data.verses.forEach(v => {
            const vNum = v.verse_key.split(':')[1];
            const span = document.createElement('span');
            span.className = 'verse';
            span.id = `v-${v.verse_key}`;
            span.innerHTML = v.text_uthmani + ` <span class="v-num">﴿${vNum}﴾</span> `;
            span.onclick = () => savePosition(v.verse_key, name, id);
            quranText.appendChild(span);
        });

        if (scrollVerse) {
            setTimeout(() => {
                const el = document.getElementById(`v-${scrollVerse}`);
                if(el) { el.classList.add('last-read'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }, 500);
        }
    }

    function savePosition(key, name, surahId) {
        document.querySelectorAll('.verse').forEach(v => v.classList.remove('last-read'));
        document.getElementById(`v-${key}`).classList.add('last-read');
        localStorage.setItem('user_bookmark', JSON.stringify({ key, name, surahId }));
        alert("تم حفظ مكانك في سورة " + name);
    }

    function updateResumeButton() {
        const saved = JSON.parse(localStorage.getItem('user_bookmark') || 'null');
        if (saved) {
            resumeBtn.style.display = 'block';
            resumeBtn.innerText = `📖 واصل من سورة ${saved.name}`;
        }
    }

    function resumeReading() {
        const saved = JSON.parse(localStorage.getItem('user_bookmark'));
        if (saved) openSurah(saved.surahId, saved.name, saved.key);
    }

    function showIndex() {
        location.reload(); // أضمن طريقة للعودة وتحديث الفهرس
    }

    start();
</script>
</body>
</html>
