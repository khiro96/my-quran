<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف الطمأنينة</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fcfaf5; color: #2c3e50; line-height: 1.6; }
        header { background: #065f46; color: white; padding: 15px; text-align: center; sticky: top; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .quran-container { background: white; padding: 20px; border-radius: 10px; text-align: justify; font-size: 1.5rem; line-height: 2.2; border: 1px solid #eee; }
        .basmalah { text-align: center; font-size: 1.8rem; color: #065f46; margin-bottom: 15px; }
        .v-num { color: #065f46; font-size: 0.9rem; margin: 0 5px; font-weight: bold; }
        .last-read { background: #fff9c4; border-bottom: 2px solid #d4af37; }
        #resume-btn { background: #d4af37; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 15px; cursor: pointer; display: none; font-weight: bold; font-size: 1.1rem; }
        .hidden { display: none; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="nav" class="nav-bar hidden">
    <button onclick="location.reload()" style="padding:5px 15px;">✕ رجوع</button>
    <b id="surah-title"></b>
    <span></span>
</div>

<header id="main-header">
    <h1>مصحف الطمأنينة</h1>
</header>

<div class="container">
    <button id="resume-btn" onclick="resumeReading()"></button>
    
    <div id="index-page" class="grid">
        <p style="grid-column: 1/3; text-align: center;">جاري تحميل الفهرس...</p>
    </div>

    <div id="reader-page" class="hidden">
        <div id="basmalah" class="basmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div id="quran-text" class="quran-container"></div>
    </div>
</div>

<script>
    const indexPage = document.getElementById('index-page');
    const readerPage = document.getElementById('reader-page');
    const quranText = document.getElementById('quran-text');
    const resumeBtn = document.getElementById('resume-btn');

    // 1. جلب السور
    fetch('https://api.quran.com/api/v4/chapters?language=ar')
        .then(res => res.json())
        .then(data => {
            indexPage.innerHTML = '';
            data.chapters.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerText = s.name_arabic;
                div.onclick = () => openSurah(s.id, s.name_arabic);
                indexPage.appendChild(div);
            });
            checkBookmark();
        })
        .catch(() => indexPage.innerHTML = "حدث خطأ. تأكد من الإنترنت.");

    // 2. فتح السورة
    function openSurah(id, name, savedVerse = null) {
        document.getElementById('main-header').classList.add('hidden');
        document.getElementById('nav').classList.remove('hidden');
        indexPage.classList.add('hidden');
        resumeBtn.classList.add('hidden');
        readerPage.classList.remove('hidden');
        document.getElementById('surah-title').innerText = name;
        
        document.getElementById('basmalah').style.display = (id == 9 || id == 1) ? 'none' : 'block';
        quranText.innerHTML = "جاري تحميل الآيات...";

        fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`)
            .then(res => res.json())
            .then(data => {
                quranText.innerHTML = '';
                data.verses.forEach(v => {
                    const num = v.verse_key.split(':')[1];
                    const span = document.createElement('span');
                    span.id = "v-" + v.verse_key;
                    span.style.cursor = "pointer";
                    span.innerHTML = v.text_uthmani + ` <span class="v-num">﴿${num}﴾</span> `;
                    span.onclick = () => {
                        document.querySelectorAll('span').forEach(s => s.classList.remove('last-read'));
                        span.classList.add('last-read');
                        localStorage.setItem('quran_bookmark', JSON.stringify({id, name, key: v.verse_key}));
                        alert("تم حفظ المكان بنجاح");
                    };
                    quranText.appendChild(span);
                });

                if(savedVerse) {
                    const el = document.getElementById("v-" + savedVerse);
                    if(el) {
                        el.classList.add('last-read');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
    }

    // 3. نظام الحفظ
    function checkBookmark() {
        const saved = JSON.parse(localStorage.getItem('quran_bookmark'));
        if (saved) {
            resumeBtn.style.display = 'block';
            resumeBtn.innerText = "📖 العودة إلى: " + saved.name;
        }
    }

    function resumeReading() {
        const saved = JSON.parse(localStorage.getItem('quran_bookmark'));
        if (saved) openSurah(saved.id, saved.name, saved.key);
    }
</script>
</body>
</html>
